<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="style.css">
<style>
/* 관리자 화면은 작업 도구라 색을 절제하고 대비를 높입니다 */
body{background:#f7f5f7}
#sky{display:none}
.admin-neutral{}
.ahead{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:18px 0;border-bottom:1px solid #e3dee4;flex-wrap:wrap}
.ahead h1{font-family:var(--disp);font-weight:400;font-size:24px;color:var(--ink)}
.ahead .out{border:1.5px solid #e3dee4;background:#fff;color:#5d5860;
  padding:8px 16px;border-radius:20px;font-family:var(--body);font-size:13px;cursor:pointer}
.tabs{display:flex;gap:8px;margin:22px 0}
.tabs button{border:1.5px solid #e3dee4;background:#fff;color:#5d5860;
  padding:9px 20px;border-radius:22px;font-family:var(--body);font-size:14px;cursor:pointer;transition:.15s}
.tabs button.on{background:var(--pink);border-color:var(--pink);color:#fff}
.panel{display:none}.panel.on{display:block}

.box{background:#fff;border-radius:18px;padding:26px 26px 24px;border:1px solid #ece7ed;box-shadow:0 6px 20px rgba(90,80,95,.06);margin-bottom:18px;overflow:hidden}
.box h3{font-family:var(--disp);font-weight:400;font-size:22px;margin-bottom:20px;color:var(--ink);
  padding-bottom:12px;border-bottom:1px solid #ece7ed;display:flex;align-items:center;gap:8px}
.box h3::before{content:"";width:9px;height:9px;border-radius:3px;background:var(--pink);flex-shrink:0}
.frow{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:center;margin-bottom:12px}
.frow.top{align-items:flex-start}
.frow:last-of-type{margin-bottom:0;border:none}
.frow textarea{border-radius:12px}
.box>.frow:last-of-type{padding-bottom:4px}
.frow,.frow>div,.frow label{background:transparent;border:0;box-shadow:none}
.box hr{display:none}
.frow:last-of-type{margin-bottom:0}
.box>*:last-child{border-bottom:0}
.box input,.box textarea,.box .drop{background-color:#fff !important}
.frow label{font-size:14px;color:#5d5860;font-weight:500}
.frow input,.frow textarea{width:100%;border:1.5px solid #e3dee4;border-radius:12px;
  padding:10px 13px;font-family:var(--body);font-size:14px;background:#fff;
  color:var(--ink);outline:none;resize:vertical}
.frow input:focus,.frow textarea:focus{border-color:var(--pink)}
.actions{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-top:26px;border:0}
.btn{border:none;background:var(--pink);color:#fff;padding:11px 26px;border-radius:14px;
  font-family:var(--body);font-size:14px;cursor:pointer}
.btn:hover{background:var(--pink-deep)}
.itembtns{display:flex;flex-direction:column;gap:8px;flex-shrink:0;width:90px;align-items:stretch}
.btn.edit,.btn.del{width:100%;padding:7px 0;font-size:12.5px;border-radius:10px;text-align:center;
  font-family:var(--body);cursor:pointer;transition:.15s}
.btn.edit{background:var(--pink) !important;color:#fff !important;border:1.5px solid var(--pink)}
.btn.edit:hover{background:var(--pink-deep);border-color:var(--pink-deep)}
.btn.del{background:#fff;color:#6f6a72;border:1.5px solid #e3dee4}
.btn.del:hover{background:#fff0f4;border-color:#e79aae;color:#b3455f}
.hint{font-size:12.5px;color:#7a757e;margin-top:6px}
.stat{font-size:13px;color:var(--pink-deep);min-height:18px}

.drop{border:1.5px dashed #ddd8dd;border-radius:14px;padding:26px 20px;text-align:center;
  color:#7a757e;cursor:pointer;transition:.2s;background:#fff}
.drop:hover,.drop.over{border-color:var(--pink);color:var(--pink-deep);background:#fffafd}
.drop .big{font-size:30px;display:block;margin-bottom:6px}
.drop.small{padding:14px 16px;font-size:13px;border-radius:12px;display:flex;
  align-items:center;justify-content:center;gap:9px;border-width:1.5px;color:var(--sub)}
.drop.small .big{font-size:17px;margin:0;display:inline}
.preview{margin-top:12px;display:none;text-align:center}
.preview img{max-width:190px;max-height:230px;border-radius:12px;display:inline-block;
  box-shadow:0 6px 16px rgba(0,0,0,.08)}
#bPrev{margin-top:10px}
#bPrev img{max-height:112px;border-radius:10px}

.list{display:flex;flex-direction:column;gap:10px}
.item{background:#fff;border:1px solid #ece7ed;border-radius:14px;padding:14px 16px;
  display:flex;gap:13px;align-items:flex-start;transition:.15s}
.item.dragging{opacity:.4}
.item.editing{border-color:var(--pink);box-shadow:0 0 0 3px var(--pink-soft)}
.item.overtop{border-top:3px solid var(--pink)}
.grip{cursor:grab;flex-shrink:0;width:16px;height:30px;align-self:center;
  display:grid;grid-template-columns:repeat(2,3px);grid-template-rows:repeat(3,3px);
  gap:3px;align-content:center;justify-content:center;opacity:.4;transition:.15s}
.grip i{display:block;width:3px;height:3px;border-radius:50%;background:#9a949d}
.grip:hover{opacity:1}
.grip:hover i{background:#6f6a72}
.grip:active{cursor:grabbing}
.grip:active{cursor:grabbing}
.item .thumb64{width:56px;height:70px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#f2f0f3}
.item .body{flex:1;min-width:0}
.item .t{font-size:15px;color:var(--ink);margin-bottom:3px}
.item .m{font-size:12.5px;color:#7a757e;font-family:var(--latin)}
.item .msg{font-size:14px;color:var(--ink);margin-top:6px;white-space:pre-wrap;word-break:break-word}
.item .tag{display:inline-block;background:#fce4ef;color:#a4406b;border:1px solid #f6c9dd;
  font-size:11.5px;font-weight:500;padding:3px 10px;border-radius:20px;margin:0 5px 4px 0}
.copyable{color:var(--pink-deep);cursor:pointer;border-bottom:1px dashed var(--pink);padding-bottom:1px}
.copyable:hover{background:var(--pink-soft);border-radius:4px}
.item.done{opacity:.5}
.item.done .t{text-decoration:line-through}
.isearch{position:relative;margin-bottom:14px}
.isearch input{width:100%;border:1.5px solid #e3dee4;border-radius:12px;background:#fff;
  padding:10px 14px 10px 38px;font-family:var(--body);font-size:14px;color:var(--ink);outline:none}
.isearch input:focus{border-color:var(--pink)}
.isearch .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9a949d;font-size:14px}
mark{background:#ffe9a8;color:inherit;border-radius:3px;padding:0 1px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chips:empty{margin-top:0}
.chip{display:inline-flex;align-items:center;gap:6px;background:#f2f0f3;color:#5d5860;
  font-size:12.5px;padding:5px 8px 5px 11px;border-radius:7px}
.chip b{font-weight:400}
.chip button{border:none;background:none;color:#9a949d;cursor:pointer;font-size:14px;
  line-height:1;padding:0 1px}
.chip button:hover{color:#c4556f}
.chk{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12.5px;color:#5d5860;white-space:nowrap;height:31px;
  cursor:pointer;user-select:none;white-space:nowrap}
.chk input{width:15px;height:15px;accent-color:var(--pink);cursor:pointer;margin:0}
.donebadge{display:inline-block;background:#f2f0f3;color:#5d5860;
  font-size:11px;padding:2px 9px;border-radius:20px;margin-left:6px}
.empty2{text-align:center;color:#7a757e;padding:40px 0;font-size:14px}

.toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 22px;border-radius:22px;font-size:14px;
  opacity:0;pointer-events:none;transition:.25s;z-index:80}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.login{max-width:360px;margin:80px auto;background:#fff;border-radius:22px;
  padding:34px 30px;border:1px solid #ece7ed;box-shadow:0 6px 20px rgba(90,80,95,.06);text-align:center}
.login h2{font-family:var(--disp);font-weight:400;font-size:22px;margin-bottom:6px}
.login p{font-size:13.5px;color:#7a757e;margin-bottom:18px}
.login input{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;
  font-family:var(--body);font-size:14px;background:#fff;color:var(--ink);
  outline:none;margin-bottom:12px;text-align:center}
.login input:focus{border-color:var(--pink)}
@media(max-width:640px){ .frow{grid-template-columns:1fr;gap:4px} }
</style>
</head>
<body spellcheck="false">

<div id="sky"></div>
<div class="toast" id="toast"></div>

<div class="wrap">
  <!-- 로그인 -->
  <div class="login" id="login">
    <h2>🔒 관리자</h2>
    <p>관리자 토큰을 입력해 주세요</p>
    <input id="tok" type="password" placeholder="ADMIN_TOKEN" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" style="width:100%" onclick="doLogin()">들어가기</button>
    <div class="stat" id="loginStat"></div>
  </div>

  <!-- 관리 화면 -->
  <div id="app" style="display:none">
    <div class="ahead">
      <h1 id="adminTitle">관리자</h1>
      <button class="out" onclick="doLogout()">로그아웃</button>
    </div>

    <div class="tabs">
      <button class="on" data-t="broadcast" onclick="tab('broadcast')">🎬 방송 히스토리</button>
      <button data-t="gallery" onclick="tab('gallery')">🖼 월간쿠룽</button>
      <button data-t="inquiry" onclick="tab('inquiry')">💌 문의</button>
    </div>

    <!-- ───── 방송 ───── -->
    <div class="panel on" id="p-broadcast">
      <div class="box">
        <h3 id="bHead">방송 히스토리 등록</h3>
        <div class="frow"><label>제목</label><input id="bTitle" spellcheck="false" autocomplete="off" placeholder="방송 제목을 입력해주세요."></div>
        <div class="frow"><label>방송일</label><input id="bDate" type="datetime-local" autocomplete="off"></div>
        <div class="frow top"><label>태그</label>
          <div>
            <input id="bTagInput" spellcheck="false" autocomplete="off" placeholder="태그 입력 후 엔터 (ex. 소통)">
            <div class="chips" id="bChips"></div>
          </div>
        </div>
        <div class="frow"><label>숲 주소</label><input id="bSoop" spellcheck="false" autocomplete="off" placeholder="비워두면 '준비 중'으로 표시"></div>
        <div class="frow"><label>유튜브 주소</label><input id="bYt" spellcheck="false" autocomplete="off" placeholder="비워두면 '준비 중'으로 표시"></div>
        <div class="frow top"><label>썸네일</label>
          <div>
            <div style="display:flex;gap:8px;align-items:stretch">
              <div class="drop small" id="bDrop" style="flex:1"><span class="big">🖼</span><span>사진 선택 또는 끌어다 놓기</span></div>
              <button type="button" class="btn" id="bFetch" onclick="fetchThumb(true)"
                style="padding:0 14px;font-size:12.5px;white-space:nowrap;border-radius:12px">주소에서 가져오기</button>
            </div>
            <input type="file" id="bFile" accept="image/*" style="display:none">
            <div class="preview" id="bPrev" style="text-align:left"><img id="bPrevImg" src="" alt="" style="max-height:140px"></div>
          </div>
        </div>
        <div class="actions">
          <span class="stat" id="bStat"></span>
          <button class="btn ghost" id="bCancel" style="display:none;background:var(--pink-soft);color:var(--pink-deep)" onclick="cancelBroadcast()">취소</button>
          <button class="btn" id="bSubmit" onclick="saveBroadcast()">등록하기</button>
        </div>
      </div>
      <div class="hint" style="margin:0 4px 8px">점 6개를 잡고 끌어서 순서를 바꿀 수 있어요</div>
      <div class="list" id="bList"></div>
    </div>

    <!-- ───── 화보 ───── -->
    <div class="panel" id="p-gallery">
      <div class="box">
        <h3 id="gHead">월간쿠룽 등록</h3>
        <div class="drop" id="drop">
          <span class="big">📷</span>
          사진을 끌어다 놓거나 클릭해서 선택
          <div class="hint">JPG · PNG · WEBP</div>
        </div>
        <input type="file" id="file" accept="image/*" style="display:none">
        <div class="preview" id="prev"><img id="prevImg" src="" alt=""></div>
        <div style="margin-top:16px">
          <div class="frow"><label>제목</label><input id="gTitle" spellcheck="false" autocomplete="off" placeholder="제목을 입력해주세요."></div>
          <div class="frow top"><label>설명</label><textarea id="gDesc" rows="3" spellcheck="false" autocomplete="off" placeholder="설명을 입력해주세요."></textarea></div>
        </div>
        <div class="actions">
          <span class="stat" id="gStat"></span>
          <button class="btn ghost" id="gCancel" style="display:none;background:var(--pink-soft);color:var(--pink-deep)" onclick="cancelGallery()">취소</button>
          <button class="btn" id="gSubmit" onclick="saveGallery()">등록하기</button>
        </div>
      </div>
      <div class="hint" style="margin:0 4px 8px">점 6개를 잡고 끌어서 순서를 바꿀 수 있어요</div>
      <div class="list" id="gList"></div>
    </div>

    <!-- ───── 문의 ───── -->
    <div class="panel" id="p-inquiry">
      <div class="isearch">
        <span class="si">&#128269;</span>
        <input id="iq" spellcheck="false" autocomplete="off"
               placeholder="닉네임 · 연락처 · 내용 검색" oninput="renderInquiry()">
      </div>
      <div class="list" id="iList"></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
applyTheme();
document.getElementById('adminTitle').textContent = fullName()+' 관리자';

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._h); t._h=setTimeout(function(){ t.classList.remove('on'); },1600);
}

/* ───── 로그인 ───── */
async function doLogin(){
  var t=document.getElementById('tok').value.trim();
  var s=document.getElementById('loginStat');
  if(!t){ s.textContent='토큰을 입력해 주세요'; return; }
  s.textContent='확인 중…';
  try{
    localStorage.setItem('adminToken', t);
    var r=await fetch(API+'/auth',{method:'POST',headers:{'X-Admin-Token':t}});
    if(!r.ok) throw new Error();
    enterApp();
  }catch(e){
    localStorage.removeItem('adminToken');
    s.textContent='토큰이 맞지 않아요';
  }
}
function doLogout(){ localStorage.removeItem('adminToken'); location.reload(); }
function enterApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  setToday();
  loadGallery(); loadBroadcast(); loadInquiry();
}
(function(){ if(DB.token()) fetch(API+'/auth',{method:'POST',headers:{'X-Admin-Token':DB.token()}})
  .then(function(r){ if(r.ok) enterApp(); }); })();

function tab(n){
  document.querySelectorAll('.tabs button').forEach(function(b){ b.classList.toggle('on', b.dataset.t===n); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.toggle('on', p.id==='p-'+n); });
}

/* 방송일 기본값 = 오늘 20:00 */
function setToday(){
  var d=new Date(), p=function(n){return('0'+n).slice(-2);};
  document.getElementById('bDate').value =
    d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T20:00';
}

/* ───── 업로드 공통 ───── */
function bindDrop(dropEl, fileEl, onDone){
  dropEl.addEventListener('click',function(){ fileEl.click(); });
  dropEl.addEventListener('dragover',function(e){ e.preventDefault(); dropEl.classList.add('over'); });
  dropEl.addEventListener('dragleave',function(){ dropEl.classList.remove('over'); });
  dropEl.addEventListener('drop',function(e){
    e.preventDefault(); dropEl.classList.remove('over');
    if(e.dataTransfer.files[0]) go(e.dataTransfer.files[0]);
  });
  fileEl.addEventListener('change',function(){ if(fileEl.files[0]) go(fileEl.files[0]); });
  async function go(f){
    toast('업로드 중…');
    try{ var res=await DB.upload(f); onDone(res.url); toast('사진이 올라갔어요'); }
    catch(e){ toast('업로드 실패 ㅠㅠ'); }
  }
}

/* ───── 화보 ───── */
var gUrl='';
bindDrop(document.getElementById('drop'), document.getElementById('file'), function(url){
  gUrl=url;
  document.getElementById('prevImg').src=url;
  document.getElementById('prev').style.display='block';
});

var gEditId=null;

function cancelGallery(){
  gEditId=null; gUrl='';
  document.getElementById('gTitle').value='';
  document.getElementById('gDesc').value='';
  document.getElementById('prev').style.display='none';
  document.getElementById('gHead').textContent='월간쿠룽 등록';
  document.getElementById('gSubmit').textContent='등록하기';
  document.getElementById('gCancel').style.display='none';
  document.getElementById('gStat').textContent='';
  loadGallery();
}

function editGallery(id){
  var g=GAL.filter(function(x){return x.id===id;})[0]; if(!g) return;
  gEditId=id; gUrl=g.image_url||'';
  document.getElementById('gTitle').value=g.title||'';
  document.getElementById('gDesc').value=g.description||'';
  if(gUrl){ document.getElementById('prevImg').src=gUrl;
            document.getElementById('prev').style.display='block'; }
  document.getElementById('gHead').textContent='월간쿠룽 수정';
  document.getElementById('gSubmit').textContent='수정 완료';
  document.getElementById('gCancel').style.display='inline-block';
  loadGallery();
  window.scrollTo({top:0,behavior:'smooth'});
}

async function saveGallery(){
  var s=document.getElementById('gStat');
  if(!gUrl){ s.textContent='먼저 사진을 올려주세요'; return; }
  var t=document.getElementById('gTitle').value.trim();
  if(!t){ s.textContent='제목을 입력해 주세요'; return; }
  s.textContent='저장 중…';
  var row={ title:t, description:document.getElementById('gDesc').value.trim(),
            image_url:gUrl, sort_order:0 };
  try{
    if(gEditId){
      var cur=GAL.filter(function(x){return x.id===gEditId;})[0];
      row.sort_order = cur?(cur.sort_order||0):0;
      await DB.update('gallery',gEditId,row);
      toast('수정됐어요 ✏️');
    }else{
      await DB.insert('gallery',row);
      toast('등록됐어요 🎉');
    }
    cancelGallery();
    loadGallery();
  }catch(e){ s.textContent='저장 실패: '+(e.message||'알 수 없는 오류'); console.error(e); }
}

var GAL=[];
async function loadGallery(){
  var box=document.getElementById('gList');
  try{
    GAL=await DB.list('gallery');
    if(!GAL.length){ box.innerHTML='<div class="empty2">등록된 화보가 없어요</div>'; return; }
    box.innerHTML=GAL.map(function(g,i){
      return '<div class="item'+(gEditId===g.id?' editing':'')+'" draggable="true" data-i="'+i+'">'+
        '<span class="grip"><i></i><i></i><i></i><i></i><i></i><i></i></span>'+
        (g.image_url?'<img class="thumb64" src="'+esc(g.image_url)+'" alt="">':'<div class="thumb64"></div>')+
        '<div class="body"><div class="t">'+esc(g.title)+'</div>'+
        '<div class="m">'+esc(String(g.created_at||'').slice(0,16))+'</div>'+
        (g.description?'<div class="msg">'+esc(g.description)+'</div>':'')+'</div>'+
        '<div class="itembtns">'+
        '<button class="btn edit" onclick="editGallery('+g.id+')">수정</button>'+
        '<button class="btn del" onclick="delItem(\'gallery\','+g.id+')">삭제</button></div></div>';
    }).join('');
    bindDrag('#gList', GAL, saveGalleryOrder);
  }catch(e){ box.innerHTML='<div class="empty2">불러오기 실패</div>'; }
}

/* 드래그로 순서 바꾸기 (공통) */
var dragI=null;
function bindDrag(sel, arr, onSave){
  var items=document.querySelectorAll(sel+' .item');
  items.forEach(function(el){
    el.addEventListener('dragstart',function(){ dragI=+el.dataset.i; el.classList.add('dragging'); });
    el.addEventListener('dragend',function(){ el.classList.remove('dragging');
      items.forEach(function(x){x.classList.remove('overtop');}); });
    el.addEventListener('dragover',function(e){ e.preventDefault(); el.classList.add('overtop'); });
    el.addEventListener('dragleave',function(){ el.classList.remove('overtop'); });
    el.addEventListener('drop',async function(e){
      e.preventDefault();
      var to=+el.dataset.i;
      if(dragI===null||dragI===to) return;
      var moved=arr.splice(dragI,1)[0];
      arr.splice(to,0,moved);
      dragI=null;
      await onSave();
    });
  });
}

async function saveGalleryOrder(){
  toast('순서 저장 중…');
  try{
    for(var i=0;i<GAL.length;i++){
      var g=GAL[i];
      if(g.sort_order!==i){
        await DB.update('gallery',g.id,{title:g.title,description:g.description,
          image_url:g.image_url,sort_order:i});
        g.sort_order=i;
      }
    }
    toast('순서가 바뀌었어요');
    loadGallery();
  }catch(e){ toast('순서 저장 실패: '+(e.message||'')); console.error(e); }
}

/* ───── 방송 ───── */
var bUrl='';
bindDrop(document.getElementById('bDrop'), document.getElementById('bFile'), function(url){
  bUrl=url;
  document.getElementById('bPrevImg').src=url;
  document.getElementById('bPrev').style.display='block';
});

var bEditId=null;
var TAGS=[];

function renderChips(){
  document.getElementById('bChips').innerHTML = TAGS.map(function(t,i){
    return '<span class="chip"><b>#'+esc(t)+'</b><button onclick="removeTag('+i+')">×</button></span>';
  }).join('');
}
function addTag(v){
  v=String(v||'').trim().replace(/^#/,'');
  if(!v) return;
  v.split(',').forEach(function(x){
    x=x.trim().replace(/^#/,'');
    if(x && TAGS.indexOf(x)<0) TAGS.push(x);
  });
  renderChips();
}
function removeTag(i){ TAGS.splice(i,1); renderChips(); }
(function(){
  var el=document.getElementById('bTagInput');
  el.addEventListener('keydown',function(e){
    if(e.key==='Enter'||e.key===','){ e.preventDefault(); addTag(el.value); el.value=''; }
    else if(e.key==='Backspace' && !el.value && TAGS.length){ TAGS.pop(); renderChips(); }
  });
  el.addEventListener('blur',function(){ if(el.value.trim()){ addTag(el.value); el.value=''; } });
})();

/* 숲·유튜브 주소에서 썸네일 가져오기 */
async function fetchThumb(manual){
  var soop=(document.getElementById('bSoop').value||'').trim();
  var yt=(document.getElementById('bYt').value||'').trim();
  var st=document.getElementById('bStat');

  function apply(img){
    bUrl=img;
    document.getElementById('bPrevImg').src=img;
    document.getElementById('bPrev').style.display='block';
    st.textContent='';
    toast('썸네일을 가져왔어요');
  }

  /* 1) 유튜브는 주소에서 바로 뽑기 (서버 요청 불필요) */
  var y=ytThumb(yt);
  if(y){ apply(y); return; }

  /* 2) 그 외(숲 등)는 서버가 페이지에서 미리보기 이미지를 읽어옴 */
  var url = soop || yt;
  if(!url){ if(manual) st.textContent='먼저 숲이나 유튜브 주소를 입력해 주세요'; return; }
  if(manual) st.textContent='썸네일 가져오는 중…';
  try{
    var r=await fetch(API+'/ogimage?url='+encodeURIComponent(url),{headers:DB.headers(false)});
    var j={};
    try{ j=await r.json(); }catch(_){}
    if(!r.ok){
      console.warn('[ogimage]', r.status, j);
      if(manual) st.textContent='실패: '+(j.error||('HTTP '+r.status));
      else toast('썸네일을 못 가져왔어요 — 직접 올려주세요');
      return;
    }
    apply(j.image);
  }catch(e){
    console.error(e);
    if(manual) st.textContent='실패: '+(e.message||'네트워크 오류');
  }
}

/* 주소 입력이 끝나면 잠시 후 썸네일 자동으로 가져오기 */
(function(){
  var timer=null;
  ['bSoop','bYt'].forEach(function(id){
    var el=document.getElementById(id);
    el.addEventListener('input',function(){
      clearTimeout(timer);
      var v=el.value.trim();
      if(!v || bUrl) return;
      if(!/^https?:\/\//i.test(v)) return;
      timer=setTimeout(function(){ fetchThumb(false); }, 700);
    });
  });
})();

function cancelBroadcast(){
  bEditId=null; bUrl='';
  ['bTitle','bTagInput','bSoop','bYt'].forEach(function(id){ document.getElementById(id).value=''; });
  TAGS=[]; renderChips();
  document.getElementById('bPrev').style.display='none';
  document.getElementById('bHead').textContent='방송 히스토리 등록';
  document.getElementById('bSubmit').textContent='등록하기';
  document.getElementById('bCancel').style.display='none';
  document.getElementById('bStat').textContent='';
  setToday();
}

function editBroadcast(id){
  var b=BC.filter(function(x){return x.id===id;})[0]; if(!b) return;
  bEditId=id; bUrl=b.thumbnail_url||'';
  document.getElementById('bTitle').value=b.title||'';
  document.getElementById('bDate').value=(b.broadcast_date||'').slice(0,16);
  TAGS=String(b.tags||'').split(',').map(function(x){return x.trim();}).filter(Boolean); renderChips();
  document.getElementById('bSoop').value=b.soop_url||'';
  document.getElementById('bYt').value=b.youtube_url||'';
  if(bUrl){ document.getElementById('bPrevImg').src=bUrl;
            document.getElementById('bPrev').style.display='block'; }
  document.getElementById('bHead').textContent='방송 히스토리 수정';
  document.getElementById('bSubmit').textContent='수정 완료';
  document.getElementById('bCancel').style.display='inline-block';
  window.scrollTo({top:0,behavior:'smooth'});
}

async function saveBroadcast(){
  var s=document.getElementById('bStat');
  var t=document.getElementById('bTitle').value.trim();
  if(!t){ s.textContent='제목을 입력해 주세요'; return; }
  s.textContent='저장 중…';
  var row={
    title:t,
    broadcast_date:document.getElementById('bDate').value||'',
    tags:TAGS.join(', '),
    soop_url:document.getElementById('bSoop').value.trim(),
    youtube_url:document.getElementById('bYt').value.trim(),
    thumbnail_url:bUrl, sort_order:0
  };
  try{
    if(bEditId){
      var cur=BC.filter(function(x){return x.id===bEditId;})[0];
      row.sort_order = cur?(cur.sort_order||0):0;
      await DB.update('broadcasts',bEditId,row);
      toast('수정됐어요 ✏️');
    }else{
      await DB.insert('broadcasts',row);
      toast('등록됐어요 🎉');
    }
    cancelBroadcast();
    loadBroadcast();
  }catch(e){ s.textContent='저장 실패: '+(e.message||'알 수 없는 오류'); console.error(e); }
}

/* 유튜브 자동 썸네일 */
function ytThumb(url){
  if(!url) return '';
  var m=String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m?('https://img.youtube.com/vi/'+m[1]+'/hqdefault.jpg'):'';
}

var BC=[];
async function loadBroadcast(){
  var box=document.getElementById('bList');
  try{
    BC=await DB.list('broadcasts');
    if(!BC.length){ box.innerHTML='<div class="empty2">등록된 방송이 없어요</div>'; return; }
    box.innerHTML=BC.map(function(b,i){
      var tags=String(b.tags||'').split(',').map(function(x){return x.trim();}).filter(Boolean)
        .map(function(x){return '<span class="tag">#'+esc(x)+'</span>';}).join('');
      var thumb=(b.thumbnail_url&&b.thumbnail_url.trim())||ytThumb(b.youtube_url);
      var th=thumb
        ? '<img class="thumb64" style="width:88px;height:56px" src="'+esc(thumb)+'" alt="">'
        : '<div class="thumb64" style="width:88px;height:56px"></div>';
      return '<div class="item'+(bEditId===b.id?' editing':'')+'" draggable="true" data-i="'+i+'">'+
        '<span class="grip"><i></i><i></i><i></i><i></i><i></i><i></i></span>'+th+
        '<div class="body"><div class="t">'+esc(b.title)+'</div>'+
        '<div class="m">'+esc(String(b.broadcast_date||'').replace('T',' '))+'</div>'+
        (tags?'<div style="margin-top:6px">'+tags+'</div>':'')+
        '</div><div class="itembtns">'+
        '<button class="btn edit" onclick="editBroadcast('+b.id+')">수정</button>'+
        '<button class="btn del" onclick="delItem(\'broadcasts\','+b.id+')">삭제</button></div></div>';
    }).join('');
    bindDrag('#bList', BC, saveBroadcastOrder);
  }catch(e){ box.innerHTML='<div class="empty2">불러오기 실패</div>'; }
}

async function saveBroadcastOrder(){
  toast('순서 저장 중…');
  try{
    for(var i=0;i<BC.length;i++){
      var b=BC[i];
      if(b.sort_order!==i){
        await DB.update('broadcasts',b.id,{
          title:b.title, broadcast_date:b.broadcast_date, tags:b.tags,
          soop_url:b.soop_url, youtube_url:b.youtube_url,
          thumbnail_url:b.thumbnail_url, sort_order:i});
        b.sort_order=i;
      }
    }
    toast('순서가 바뀌었어요');
    loadBroadcast();
  }catch(e){ toast('순서 저장 실패: '+(e.message||'')); console.error(e); }
}

/* ───── 문의 ───── */
var INQ=[];

function hl(text, q){
  var e=esc(text);
  if(!q) return e;
  var rx=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return e.replace(rx,'<mark>$1</mark>');
}

async function loadInquiry(){
  try{ INQ=await DB.list('inquiries'); }
  catch(e){ document.getElementById('iList').innerHTML='<div class="empty2">불러오기 실패</div>'; return; }
  renderInquiry();
}

function renderInquiry(){
  var box=document.getElementById('iList');
  var q=(document.getElementById('iq').value||'').trim();
  var lower=q.toLowerCase();
  var rows = q ? INQ.filter(function(x){
    return ((x.nickname||'')+' '+(x.contact||'')+' '+(x.message||'')).toLowerCase().indexOf(lower)>=0;
  }) : INQ;

  if(!rows.length){
    box.innerHTML='<div class="empty2">'+(q?'검색 결과가 없어요':'받은 문의가 없어요')+'</div>';
    return;
  }
  box.innerHTML=rows.map(function(x){
    var isDone = !!(x.done && x.done!=='0');
    var c=x.contact
      ? '<span class="copyable" onclick="copyText(this.textContent)">'+hl(x.contact,q)+'</span>'
      : '<span style="color:#9a949d">연락처 없음</span>';
    return '<div class="item'+(isDone?' done':'')+'"><div class="body">'+
      '<div class="t">'+hl(x.nickname,q)+(isDone?'<span class="donebadge">처리완료</span>':'')+'</div>'+
      '<div class="m">'+esc(String(x.created_at||'').slice(0,16))+' · '+c+'</div>'+
      '<div class="msg">'+hl(x.message,q)+'</div>'+
      '</div><div class="itembtns">'+
      '<label class="chk"><input type="checkbox" '+(isDone?'checked':'')+
      ' onchange="toggleDone('+x.id+',this.checked)">처리 완료</label>'+
      '<button class="btn del" onclick="delItem(\'inquiries\','+x.id+')">삭제</button>'+
      '</div></div>';
  }).join('');
}

async function toggleDone(id, val){
  try{
    await DB.update('inquiries', id, { done: val ? 1 : 0 });
    toast(val ? '처리 완료로 표시했어요' : '미처리로 되돌렸어요');
    loadInquiry();
  }catch(e){ toast('변경 실패: '+(e.message||'')); console.error(e); loadInquiry(); }
}

function copyText(t){
  if(navigator.clipboard) navigator.clipboard.writeText(t).then(function(){ toast('복사했어요 📋'); });
  else{
    var ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove(); toast('복사했어요 📋');
  }
}

/* ───── 삭제 ───── */
async function delItem(table,id){
  if(!confirm('정말 삭제할까요?')) return;
  try{
    await DB.remove(table,id);
    toast('삭제됐어요');
    if(table==='gallery') loadGallery();
    else if(table==='broadcasts') loadBroadcast();
    else loadInquiry();
  }catch(e){ toast('삭제 실패: '+(e.message||'')); console.error(e); }
}
</script>
