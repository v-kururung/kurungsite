<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div id="sky"></div>
<header class="top"></header>

<main class="content"><div class="wrap">
  <div class="shead">
    <div class="stitle">
      <span class="mark">&#10048;</span>
      <h2 id="secTitle"></h2>
      <span class="range" id="count"></span>
    </div>
    <div class="search">
      <span class="si">&#128269;</span>
      <input id="q" type="text" oninput="applyFilter()">
    </div>
  </div>
  <div class="vgrid" id="grid"><div class="vempty">불러오는 중…</div></div>
  <div class="pager" id="pager"></div>
</div></main>

<footer></footer>

<div class="ov" id="soonOv">
  <div class="pop">
    <div class="emo" id="soonEmo">&#127916;</div>
    <h3 id="soonTitle">준비 중이에요</h3>
    <p id="soonMsg"></p>
    <button onclick="closeSoon()">확인</button>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
initPage('summary.html');

var B=CFG.broadcast||{};
document.getElementById('secTitle').textContent=T(B.sectionTitle||'방송 히스토리');
document.getElementById('q').placeholder=T(B.searchHint||'검색');

var ALL=[], FILTERED=[], PER=B.perPage||20, page=1;

/* 유튜브 자동 썸네일 */
function ytThumb(url){
  if(!url) return '';
  var m=String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m?('https://img.youtube.com/vi/'+m[1]+'/hqdefault.jpg'):'';
}
function fmtDate(s){
  var d=new Date(s); if(isNaN(d)) return esc(s);
  var dow=['일','월','화','수','목','금','토'][d.getDay()];
  var p=function(n){return('0'+n).slice(-2);};
  return d.getFullYear()+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())+' ('+dow+')';
}

function showSoon(label){
  document.getElementById('soonMsg').innerHTML =
    esc((B.soonText||'아직 {label} 다시보기가 올라오지 않았어요.').replace('{label}', label));
  document.getElementById('soonOv').classList.add('on');
}
function closeSoon(){document.getElementById('soonOv').classList.remove('on');}
document.getElementById('soonOv').addEventListener('click',function(e){
  if(e.target===this) closeSoon();
});

function card(b){
  var thumb=(b.thumbnail_url&&String(b.thumbnail_url).trim())
    ? String(b.thumbnail_url).trim() : ytThumb(b.youtube_url);
  var img=thumb?'<img src="'+esc(thumb)+'" alt="" onerror="this.style.display=\'none\'">':'';
  var tags=String(b.tags||'').split(',').map(function(t){return t.trim();}).filter(Boolean)
           .map(function(t){return '<span>#'+esc(t)+'</span>';}).join('');

  var links=(B.platforms||[]).map(function(pf){
    var url=(b[pf.field]&&String(b[pf.field]).trim())||'';
    var icon=/\.(png|jpg|jpeg|svg|webp|gif)$/i.test(pf.icon||'')
      ? '<img src="'+esc(pf.icon)+'" alt="">'
      : '<span>'+esc(pf.icon||'')+'</span>';
    return url
      ? '<a href="'+esc(url)+'" target="_blank" rel="noopener">'+icon+esc(pf.label)+'</a>'
      : '<a class="soon" onclick="showSoon(\''+esc(pf.label)+'\')">'+icon+esc(pf.label)+'</a>';
  }).join('');

  return '<div class="vcard"><div class="vthumb"><div class="vph">&#127916;</div>'+img+'</div>'+
    '<div class="vbody"><div class="vtitle">'+esc(b.title||'무제')+'</div>'+
    '<div class="vdate">'+fmtDate(b.broadcast_date)+'</div>'+
    (tags?'<div class="vtags">'+tags+'</div>':'')+
    '<div class="vlabel">'+esc(T(B.replayLabel||'다시보기'))+'</div>'+
    '<div class="vlinks">'+links+'</div></div></div>';
}

function renderPage(){
  var grid=document.getElementById('grid');
  var total=FILTERED.length;
  var totalPages=Math.max(1,Math.ceil(total/PER));
  if(page>totalPages) page=totalPages;

  if(!total){
    var q=(document.getElementById('q').value||'').trim();
    grid.innerHTML='<div class="vempty">'+(q?'검색 결과가 없어요 \uD83C\uDF43':esc(T(B.emptyText||'')))+'</div>';
  }else{
    var s=(page-1)*PER;
    grid.innerHTML=FILTERED.slice(s,s+PER).map(card).join('');
  }
  document.getElementById('count').textContent=total?('총 '+total+'개'):'';
  renderPager(totalPages);
}
function renderPager(totalPages){
  var pg=document.getElementById('pager');
  if(totalPages<=1){ pg.innerHTML=''; return; }
  var h='<button '+(page<=1?'disabled':'')+' onclick="goPage('+(page-1)+')">&#8249;</button>';
  for(var i=1;i<=totalPages;i++)
    h+='<button class="'+(i===page?'on':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  h+='<button '+(page>=totalPages?'disabled':'')+' onclick="goPage('+(page+1)+')">&#8250;</button>';
  pg.innerHTML=h;
}
function goPage(p){
  page=p; renderPage();
  /* scrollIntoView 는 iframe 밖(숲 게시글)까지 끌어내리므로 쓰지 않습니다.
     window.scrollTo 는 이 창 안에서만 움직여서, 임베드에선 아무 일도 없고
     사이트로 직접 들어온 경우에만 목록 위로 부드럽게 올라갑니다. */
  var y=document.getElementById('grid').getBoundingClientRect().top+(window.scrollY||0)-84;
  window.scrollTo({top:Math.max(0,y),behavior:'smooth'});
}
function applyFilter(){
  var q=(document.getElementById('q').value||'').trim().toLowerCase();
  FILTERED = q ? ALL.filter(function(b){
    return ((b.title||'')+' '+(b.tags||'')).toLowerCase().indexOf(q)>=0;
  }) : ALL.slice();
  page=1; renderPage();
}

(async function(){
  try{
    ALL=await DB.list('broadcasts',{order:[{col:'broadcast_date',asc:false}]});
  }catch(e){ ALL=[]; }
  applyFilter();
})();
</script>
</body>
</html>
