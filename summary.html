<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>쿠룽v</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Gamja+Flower&family=Poppins:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#f6b7d8; --pink-deep:#ee9bc6; --pink-soft:#ffe3f1;
  --yellow:#ffd86b; --yellow-soft:#fff0c6; --lav-soft:#ebd8ff;
  --page:#fff9fc; --card:#ffffff; --ink:#413a48; --sub:#867a83;
  --line:#fbe9f2; --shadow:0 18px 44px rgba(238,155,198,.18);
  --disp:"Jua",sans-serif; --body:"Gowun Dodum",sans-serif;
  --hand:"Gamja Flower",cursive; --latin:"Poppins",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--page);
  font-size:17px;line-height:1.75;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.wrap{max-width:1000px;margin:0 auto;padding:0 24px}

#sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.spark{position:absolute;top:-24px;color:var(--pink);opacity:.6;animation:drift linear infinite}
@keyframes drift{to{transform:translateY(106vh) rotate(160deg);opacity:0}}
@media(prefers-reduced-motion:reduce){.spark{display:none}}

/* 탑 */
.top{position:sticky;top:0;z-index:20;background:rgba(255,249,252,.82);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;height:70px}
.logo{font-family:var(--disp);font-size:28px;color:var(--ink);display:flex;align-items:center;gap:2px}
.logo b{color:var(--ink);font-weight:400}
.logo .v{color:var(--ink);font-size:30px}
.menu{display:flex;gap:34px}
.menu a{font-size:15px;color:var(--sub);position:relative;padding:4px 0;transition:color .2s}
.menu a:hover{color:var(--pink-deep)}
.menu a.on{color:var(--ink)}
.menu a.on::after{content:"";position:absolute;left:50%;transform:translateX(-50%);
  bottom:-4px;width:6px;height:6px;border-radius:50%;background:var(--pink)}

/* 컨텐츠 */
.content{position:relative;z-index:1;padding:48px 0 20px}
.shead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}
.stitle{display:flex;align-items:baseline;gap:11px}
.stitle .mark{align-self:center;flex-shrink:0;color:var(--pink);font-size:17px;line-height:1}
.stitle h2{font-family:var(--disp);font-weight:400;font-size:27px;color:var(--ink);letter-spacing:.5px;white-space:nowrap}
.stitle .range{font-family:var(--latin);font-weight:500;font-size:15px;color:var(--sub)}

/* 검색창 */
.search{position:relative;flex-shrink:0}
.search input{font-family:var(--body);font-size:14px;color:var(--ink);
  border:1.5px solid var(--line);background:var(--card);border-radius:22px;
  padding:9px 16px 9px 38px;width:220px;outline:none;transition:.2s}
.search input:focus{border-color:var(--pink);width:250px}
.search input::placeholder{color:var(--sub)}
.search .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:14px;pointer-events:none}
@media(max-width:560px){ .search input{width:100%} .search{flex:1} .shead{flex-wrap:wrap} }

/* 방송 카드 그리드 */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;margin-top:8px}
.vcard{background:var(--card);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);
  display:flex;flex-direction:column;transition:transform .2s}
.vcard:hover{transform:translateY(-4px)}
.vthumb{aspect-ratio:16/9;position:relative;
  background:linear-gradient(150deg,var(--yellow-soft),var(--pink-soft))}
.vthumb .vph{position:absolute;inset:0;display:grid;place-items:center;font-size:34px;opacity:.7}
.vthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.vbody{padding:15px 17px 17px;display:flex;flex-direction:column;gap:9px;flex:1}
.vtitle{font-size:16.5px;line-height:1.35;color:var(--ink);word-break:keep-all;overflow-wrap:break-word;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vdate{font-family:var(--latin);font-size:13px;color:var(--sub);letter-spacing:.3px}
.vtags{display:flex;flex-wrap:wrap;gap:6px}
.vtags span{background:var(--pink-soft);color:var(--pink-deep);font-size:12px;padding:3px 10px;border-radius:20px}
.vlabel{margin-top:auto;font-size:12.5px;color:var(--sub);margin-bottom:-5px}
.vlinks{display:flex;gap:8px;padding-top:0}
.vlinks a{display:flex;align-items:center;gap:6px;font-size:13px;padding:8px 14px;border-radius:12px;
  background:var(--page);color:var(--ink);transition:.2s}
.vlinks a:hover{background:var(--lav-soft)}
.vlinks a img{width:15px;height:15px;object-fit:contain}
.vlinks .soon{background:transparent;border:1.5px dashed var(--line);color:var(--sub);cursor:pointer}
.vlinks .soon:hover{background:var(--page);border-color:var(--pink)}
.vlinks .soon img{opacity:.45;filter:grayscale(.4)}

/* 준비중 모달 */
.ov{position:fixed;inset:0;background:rgba(150,90,120,.32);backdrop-filter:blur(3px);
  display:none;place-items:center;z-index:60;padding:20px}
.ov.on{display:grid}
.pop{background:var(--card);border-radius:22px;padding:30px 28px;width:100%;max-width:320px;text-align:center}
.pop .emo{font-size:38px}
.pop h3{font-family:var(--disp);font-weight:400;font-size:21px;margin:8px 0 6px;color:var(--ink)}
.pop p{font-size:14px;color:var(--sub);line-height:1.6}
.pop button{margin-top:18px;border:none;background:var(--pink);color:#fff;font-family:var(--body);
  font-size:14px;padding:11px 28px;border-radius:14px;cursor:pointer}
.pop button:hover{background:var(--pink-deep)}
.vempty{grid-column:1/-1;text-align:center;color:var(--sub);padding:60px 0;font-size:15px}

/* 페이저 */
.pager{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:34px;flex-wrap:wrap}
.pager button{min-width:36px;height:36px;padding:0 10px;border:1.5px solid var(--line);
  background:var(--card);color:var(--sub);border-radius:12px;font-family:var(--latin);font-size:14px;
  cursor:pointer;transition:.15s}
.pager button:hover:not(:disabled){border-color:var(--pink);color:var(--pink-deep)}
.pager button.on{background:var(--pink);border-color:var(--pink);color:#fff}
.pager button:disabled{opacity:.4;cursor:default}

footer{position:relative;z-index:1;margin-top:56px;padding:34px 0 44px;text-align:center;border-top:1px solid var(--line)}
footer .cloud{font-size:22px;letter-spacing:6px;color:var(--pink);opacity:.85}
footer p{margin-top:10px;font-size:13px;color:var(--sub)}

@media(max-width:680px){ .menu{gap:20px} .vgrid{grid-template-columns:1fr} }
</style>
</head>
<body>

<div id="sky"></div>

<header class="top"><div class="wrap">
  <a href="index.html" class="logo">쿠<b>룽</b><span class="v">v</span></a>
  <nav class="menu">
    <a href="index.html">메인</a>
    <a href="summary.html" class="on">방송 히스토리</a>
    <a href="monthly.html">월간쿠룽</a>
    <a href="orders.html">주문내역</a>
  </nav>
</div></header>

<main class="content"><div class="wrap">
  <div class="shead">
    <div class="stitle">
      <span class="mark">❀</span>
      <h2>방송 히스토리</h2>
      <span class="range" id="count"></span>
    </div>
    <div class="search">
      <span class="si">🔍</span>
      <input id="q" type="text" placeholder="제목·태그 검색" oninput="applyFilter()">
    </div>
  </div>
  <div class="vgrid" id="grid"><div class="vempty">불러오는 중…</div></div>
  <div class="pager" id="pager"></div>
</div></main>

<footer><div class="wrap">
  <div class="cloud">☁ ✦ ☁</div>
  <p>© 2026 쿠룽v</p>
</div></footer>

<div class="ov" id="soonOv" onclick="if(event.target===this)closeSoon()">
  <div class="pop">
    <div class="emo" id="soonEmo">🎬</div>
    <h3 id="soonTitle">준비 중이에요</h3>
    <p id="soonMsg">아직 다시보기 영상이 올라오지 않았어요.<br>조금만 기다려 주세요 🍃</p>
    <button onclick="closeSoon()">확인</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var DEBUG=false;
var SUPA={ url:'https://vamcglwzfydknvgivaho.supabase.co', anonKey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhbWNnbHd6Znlka252Z2l2YWhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NTE5MTksImV4cCI6MjEwMDEyNzkxOX0.3C7MXa4RL-iJaVZ7ueAGxYSY2CeOqAdAGt4FEQKrrk0' };
var sb=(SUPA.url && window.supabase) ? window.supabase.createClient(SUPA.url, SUPA.anonKey) : null;

var SOOP_DAYS=90;   /* 숲 VOD 유지 기간(일). 이 기간 지나면 숲 버튼 자동 숨김 */

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showSoon(kind, mode){
  var t=document.getElementById('soonTitle');
  var e=document.getElementById('soonEmo');
  var m=document.getElementById('soonMsg');
  if(mode==='expired'){
    if(e) e.textContent='🍃';
    if(t) t.textContent='보관 기간이 지났어요';
    if(m) m.innerHTML=esc(kind)+'는 보관 기간(3개월)이 지나<br>다시보기가 어려워요 ㅠㅠ';
  }else{
    if(e) e.textContent='🎬';
    if(t) t.textContent='준비 중이에요';
    if(m) m.innerHTML='아직 '+esc(kind)+' 다시보기가 올라오지 않았어요.<br>조금만 기다려 주세요 🍃';
  }
  document.getElementById('soonOv').classList.add('on');
}
function closeSoon(){document.getElementById('soonOv').classList.remove('on');}

/* 유튜브 URL → 영상 ID → 자동 썸네일 */
function ytId(url){
  if(!url) return '';
  var m=String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m?m[1]:'';
}
function ytThumb(url){ var id=ytId(url); return id?('https://img.youtube.com/vi/'+id+'/hqdefault.jpg'):''; }

/* 숲 VOD 생존 여부 (방송일 + SOOP_DAYS 이내면 노출) */
function soopAlive(dateStr){
  if(!dateStr) return true;
  var d=new Date(dateStr); if(isNaN(d)) return true;
  return (Date.now()-d.getTime())/86400000 < SOOP_DAYS;
}

function fmtDate(s){
  var d=new Date(s); if(isNaN(d)) return esc(s);
  var dow=['일','월','화','수','목','금','토'][d.getDay()];
  var p=function(n){return('0'+n).slice(-2);};
  return d.getFullYear()+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())+' ('+dow+')';
}

function card(b){
  var thumb=(b.thumbnail_url&&String(b.thumbnail_url).trim())?String(b.thumbnail_url).trim():ytThumb(b.youtube_url);
  var img=thumb?'<img src="'+esc(thumb)+'" alt="" onerror="this.style.display=\'none\'">':'';
  var tags=String(b.tags||'').split(',').map(function(t){return t.trim();}).filter(Boolean)
           .map(function(t){return '<span>#'+esc(t)+'</span>';}).join('');
  var yt=(b.youtube_url&&String(b.youtube_url).trim());
  var soopUrl=(b.soop_url&&String(b.soop_url).trim());
  var soopOk=soopAlive(b.broadcast_date);
  var links='';
  /* 숲 — 살아있고 URL 있으면 링크 / 아직 없으면 준비중 / 기간 지나면 만료 안내 */
  if(soopOk && soopUrl){
    links += '<a href="'+esc(b.soop_url)+'" target="_blank" rel="noopener"><img src="soop.png" alt="">숲</a>';
  }else if(!soopOk){
    links += '<a class="soon" onclick="showSoon(\'숲 VOD\',\'expired\')"><img src="soop.png" alt="">숲</a>';
  }else{
    links += '<a class="soon" onclick="showSoon(\'숲 VOD\')"><img src="soop.png" alt="">숲</a>';
  }
  /* 유튜브 — URL 있으면 링크, 없으면 준비중 */
  links += yt
    ? '<a href="'+esc(b.youtube_url)+'" target="_blank" rel="noopener"><img src="youtube.png" alt="">유튜브</a>'
    : '<a class="soon" onclick="showSoon(\'유튜브\')"><img src="youtube.png" alt="">유튜브</a>';
  return '<div class="vcard"><div class="vthumb"><div class="vph">🎬</div>'+img+'</div>'+
    '<div class="vbody"><div class="vtitle">'+esc(b.title||'무제')+'</div>'+
    '<div class="vdate">'+fmtDate(b.broadcast_date)+'</div>'+
    (tags?'<div class="vtags">'+tags+'</div>':'')+
    '<div class="vlabel">다시보기</div>'+
    '<div class="vlinks">'+links+'</div>'+
    '</div></div>';
}

var ALL=[];        /* 불러온 전체 방송 목록 */
var FILTERED=[];   /* 검색 필터 적용된 목록 */
var PER_PAGE=20;   /* 한 페이지에 보여줄 방송 수 */
var page=1;

function renderPage(){
  var grid=document.getElementById('grid');
  var total=FILTERED.length;
  var totalPages=Math.max(1,Math.ceil(total/PER_PAGE));
  if(page>totalPages) page=totalPages;

  if(!total){
    var q=(document.getElementById('q').value||'').trim();
    grid.innerHTML='<div class="vempty">'+(q?'검색 결과가 없어요 🍃':'아직 등록된 방송이 없어요 🍃')+'</div>';
  }else{
    var start=(page-1)*PER_PAGE;
    grid.innerHTML=FILTERED.slice(start,start+PER_PAGE).map(card).join('');
  }
  var c=document.getElementById('count'); if(c) c.textContent=total?('총 '+total+'개'):'';
  renderPager(totalPages);
}

function renderPager(totalPages){
  var pg=document.getElementById('pager'); if(!pg) return;
  if(totalPages<=1){ pg.innerHTML=''; return; }
  var h='';
  h+='<button '+(page<=1?'disabled':'')+' onclick="goPage('+(page-1)+')">‹</button>';
  for(var i=1;i<=totalPages;i++){
    h+='<button class="'+(i===page?'on':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  }
  h+='<button '+(page>=totalPages?'disabled':'')+' onclick="goPage('+(page+1)+')">›</button>';
  pg.innerHTML=h;
}

function goPage(p){
  page=p; renderPage();
  var g=document.getElementById('grid'); if(g) g.scrollIntoView({behavior:'smooth',block:'start'});
}

function applyFilter(){
  var q=(document.getElementById('q').value||'').trim().toLowerCase();
  FILTERED = q ? ALL.filter(function(b){
    return ((b.title||'')+' '+(b.tags||'')).toLowerCase().indexOf(q)>=0;
  }) : ALL.slice();
  page=1;            /* 검색하면 항상 1페이지부터 */
  renderPage();
}

async function load(){
  var rows=[];
  try{
    if(sb){
      var res=await sb.from('broadcasts').select('*').order('broadcast_date',{ascending:false});
      if(res.error) throw res.error;
      rows=res.data||[];
    }
  }catch(e){ if(DEBUG) console.warn('broadcasts',e && e.message); }
  ALL=rows;
  applyFilter();
}
load();

/* 배경 반짝이 */
(function(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  var sky=document.getElementById('sky'),g=['✦','♡','✧','⋆','☁'];
  for(var i=0;i<14;i++){
    var s=document.createElement('span');s.className='spark';s.textContent=g[i%g.length];
    s.style.left=(Math.random()*100)+'%';s.style.fontSize=(11+Math.random()*16)+'px';
    s.style.color=i%2?'var(--pink)':'var(--yellow)';
    s.style.animationDuration=(11+Math.random()*10)+'s';s.style.animationDelay=(-Math.random()*18)+'s';
    sky.appendChild(s);
  }
})();
</script>
</body>
</html>
