<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sky"></div>
<header class="top"></header>

<main class="content"><div class="wrap">

  <!-- 이번주 일정 -->
  <section>
    <div class="shead">
      <div class="stitle">
        <span class="mark">&#10048;</span>
        <h2 id="calTitle"></h2>
        <span class="range" id="weekRange"></span>
      </div>
      <span class="live" onclick="renderWeek()" title="클릭하면 즉시 새로고침">
        <span class="dot"></span><span id="syncLabel">실시간</span>
      </span>
    </div>
    <div class="week" id="week"></div>
  </section>

  <!-- 프로필 -->
  <section class="profile">
    <div class="portrait" id="portrait"></div>
    <div class="pinfo">
      <div class="en">Profile</div>
      <h2 id="pName"></h2>
      <div class="hearts" id="pHearts"></div>
      <div class="rows" id="pRows"></div>
      <div class="bubble" id="pBubble"></div>
    </div>
  </section>

  <!-- 링크 -->
  <nav class="links" id="links"></nav>

</div></main>

<footer></footer>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
initPage('index.html');
renderLinks('#links');

/* 프로필 사진 — 관리자에서 바꾼 사진이 있으면 그걸 씁니다 */
(async function(){
  var p=CFG.profile||{}, src=p.image||'';
  try{
    var st=await DB.settings();
    if(st && st.profile_image) src=st.profile_image;
  }catch(e){ }
  document.getElementById('portrait').innerHTML = src
    ? '<img src="'+esc(src)+'" alt="'+esc(p.nameMain)+'" onerror="this.remove()">'
    : '<div class="ph">&#129498;</div>';
})();

/* 프로필 */
(function(){
  var p=CFG.profile||{};

  document.getElementById('pName').innerHTML =
    esc(p.nameMain)+(p.nameAccent?'<span>'+esc(p.nameAccent)+'</span>':'');

  var h=''; for(var i=0;i<(p.hearts||0);i++) h+='\u2665 ';
  document.getElementById('pHearts').textContent=h.trim();

  document.getElementById('pRows').innerHTML=(p.rows||[]).map(function(r){
    var v=r.highlight ? '<b>'+esc(r.value)+'</b>' : esc(r.value);
    if(r.dday) v+=' <span class="dday" id="dday"></span>';
    return '<div class="r"><span class="k">'+esc(r.key)+'</span><span class="v">'+v+'</span></div>';
  }).join('');

  var b=document.getElementById('pBubble');
  if(p.bubble) b.textContent=p.bubble; else b.style.display='none';

  var el=document.getElementById('dday');
  if(el && p.debutDate){
    var now=new Date(); now.setHours(0,0,0,0);
    var d=new Date(p.debutDate+'T00:00:00');
    var diff=Math.round((d-now)/86400000);
    el.textContent = diff>0 ? 'D-'+diff : (diff===0 ? 'D-DAY' : '데뷔 '+(-diff+1)+'일째');
  }
})();

/* 주간 일정 (구글 캘린더) */
var CAL=CFG.calendar||{};
var DOW=['월','화','수','목','금','토','일'];
document.getElementById('calTitle').textContent=T(CAL.sectionTitle||'이번주 일정');

function ymd(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function ymdTZ(d){return new Intl.DateTimeFormat('en-CA',{timeZone:CAL.timezone||'Asia/Seoul'}).format(d);}
function mondayOf(date){
  var d=new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate()-((d.getDay()+6)%7));
  return d;
}

async function fetchWeek(start,end){
  if(!CAL.apiKey||!CAL.calendarId) return {};
  var tz=CAL.timezone||'Asia/Seoul';
  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL.calendarId)+'/events'
    +'?key='+CAL.apiKey+'&singleEvents=true&orderBy=startTime&maxResults=100&timeZone='+tz
    +'&timeMin='+encodeURIComponent(start+'T00:00:00+09:00')
    +'&timeMax='+encodeURIComponent(end+'T23:59:59+09:00');
  var out={};
  try{
    var r=await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    var j=await r.json();
    (j.items||[]).forEach(function(ev){
      var st=ev.start||{}, key, tl='';
      if(st.date){ key=st.date; }
      else if(st.dateTime){
        var dt=new Date(st.dateTime);
        key=ymdTZ(dt);
        tl=new Intl.DateTimeFormat('ko-KR',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false}).format(dt);
      } else return;
      (out[key]=out[key]||[]).push({time:tl, title:ev.summary||'(제목 없음)'});
    });
  }catch(e){ }
  return out;
}

async function renderWeek(){
  var mon=mondayOf(new Date());
  var sun=new Date(mon); sun.setDate(sun.getDate()+6);
  var todayStr=ymd(new Date());

  document.getElementById('weekRange').textContent=
    (mon.getMonth()+1)+'/'+mon.getDate()+' ~ '+(sun.getMonth()+1)+'/'+sun.getDate();

  var data=await fetchWeek(ymd(mon),ymd(sun));
  var html='';
  for(var i=0;i<7;i++){
    var d=new Date(mon); d.setDate(mon.getDate()+i);
    var ds=ymd(d);
    var cls='day'+(i===6?' sun':'')+(i===5?' sat':'');
    if(ds===CAL.specialDate) cls+=' special';
    else if(ds===todayStr) cls+=' today';

    var evts=data[ds]||[], inner;
    if(evts.length){
      var times=evts.map(function(e){return e.time;}).filter(Boolean);
      var titles=evts.map(function(e){return e.title;});
      inner=(times.length?'<span class="etime">'+esc(times.join(' \u00b7 '))+'</span>':'')
           +'<span class="etitle">'+esc(titles.join(' \u00b7 '))+'</span>';
      var tip=esc(evts.map(function(e){return (e.time?e.time+' ':'')+e.title;}).join(' / '));
      inner='<div class="evt" title="'+tip+'"><div class="evt-in">'+inner+'</div></div>';
    }else{
      inner='<div class="evt empty"><div class="evt-in"><span class="etitle">'
            +esc(CAL.emptyText||'\u2014')+'</span></div></div>';
    }
    html+='<div class="'+cls+'"><div class="dow">'+DOW[i]+'</div>'
        +'<div class="date">'+d.getDate()+'</div>'+inner+'</div>';
  }
  document.getElementById('week').innerHTML=html;

  var t=new Date(), p=function(n){return('0'+n).slice(-2);};
  document.getElementById('syncLabel').textContent='업데이트 '+
    t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate())+' '+
    p(t.getHours())+':'+p(t.getMinutes())+':'+p(t.getSeconds());
}

renderWeek();
setInterval(renderWeek,(CAL.pollMinutes||60)*60*1000);
(function rollover(){
  var now=new Date(), nm=mondayOf(now);
  nm.setDate(nm.getDate()+7);
  setTimeout(function(){ renderWeek(); rollover(); },(nm-now)+1000);
})();
</script>
</body>
</html>
