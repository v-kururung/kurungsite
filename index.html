<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>쿠룽v — 메인 (핑크·옐로우)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Gamja+Flower&family=Poppins:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#f6b7d8; --pink-deep:#ee9bc6; --pink-soft:#ffe3f1;
  --yellow:#ffd86b; --yellow-soft:#fff0c6; --lav-soft:#ebd8ff;
  --page:#fff9fc; --card:#ffffff; --ink:#413a48; --sub:#867a83;
  --line:#fbe9f2; --shadow:0 18px 44px rgba(238,155,198,.18);
  --disp:"Jua",sans-serif; --body:"Gowun Dodum",sans-serif;
  --hand:"Gamja Flower",cursive; --latin:"Poppins",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--page);
  font-size:17px;line-height:1.75;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.wrap{max-width:1000px;margin:0 auto;padding:0 24px}

#sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.spark{position:absolute;top:-24px;color:var(--pink);opacity:.6;animation:drift linear infinite}
@keyframes drift{to{transform:translateY(106vh) rotate(160deg);opacity:0}}
@media(prefers-reduced-motion:reduce){.spark{display:none}}

/* ══ 탑 ══ */
.top{position:sticky;top:0;z-index:20;background:rgba(255,249,252,.82);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;height:70px}
.logo{font-family:var(--disp);font-size:28px;color:var(--ink);display:flex;align-items:center;gap:2px}
.logo b{color:var(--ink);font-weight:400}
.logo .v{color:var(--ink);font-size:30px}
.menu{display:flex;gap:34px}
.menu a{font-size:15px;color:var(--sub);position:relative;padding:4px 0;transition:color .2s}
.menu a:hover{color:var(--pink-deep)}
.menu a.on{color:var(--ink)}
.menu a.on::after{content:"";position:absolute;left:50%;transform:translateX(-50%);
  bottom:-4px;width:6px;height:6px;border-radius:50%;background:var(--pink)}
.ask{font-family:var(--body);font-size:14px;padding:9px 20px;border:none;cursor:pointer;
  background:var(--pink);color:#fff;border-radius:22px;transition:.2s;box-shadow:0 6px 14px rgba(246,183,216,.5)}
.ask:hover{background:var(--pink-deep);transform:translateY(-1px)}

/* ══ 컨텐츠 ══ */
.content{position:relative;z-index:1;padding:48px 0 20px}
.shead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}
.stitle{display:flex;align-items:baseline;gap:11px}
.stitle .mark{align-self:center;flex-shrink:0;color:var(--pink);font-size:17px;line-height:1}
.stitle h2{font-family:var(--disp);font-weight:400;font-size:27px;color:var(--ink);letter-spacing:.5px}
.stitle .range{font-family:var(--latin);font-weight:500;font-size:15px;color:var(--sub);letter-spacing:.3px}
.shead .live{font-size:13px;color:var(--sub);display:flex;align-items:center;gap:6px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--pink);box-shadow:0 0 0 4px rgba(246,183,216,.25);animation:pulse 2s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 7px rgba(246,183,216,0)}}

/* 주간 스트립 */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
.day{background:var(--card);border-radius:20px;padding:16px 10px 18px;text-align:center;
  box-shadow:var(--shadow);min-height:172px;display:flex;flex-direction:column;
  align-items:center;transition:transform .2s}
.day:hover{transform:translateY(-4px)}
.day .dow{font-size:14px;color:var(--sub)}
.day.sun .dow{color:var(--pink-deep)}
.day.sat .dow{color:#d99a3c}
.day .date{font-family:var(--disp);font-size:25px;margin-top:2px;color:var(--ink)}
.day .evt{margin-top:auto;width:100%;height:64px;padding:6px 8px;border-radius:12px;
  background:var(--page);display:flex;align-items:center;justify-content:center;overflow:hidden}
.day .evt-in{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.day .etime{color:var(--pink-deep);font-family:var(--latin);font-weight:600;font-size:12px;line-height:1.1}
.day .etitle{font-size:13.5px;line-height:1.3;color:var(--ink);text-align:center;word-break:break-word;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.day .evt.empty{background:transparent}
.day .evt.empty .etitle{color:var(--sub)}
.day.today{background:linear-gradient(155deg,#ff9dcb,#e778ae);
  box-shadow:0 14px 28px rgba(231,120,174,.45);transform:translateY(-3px)}
.day.today .dow,.day.today .date{color:#fff}
.day.today .evt{background:rgba(255,255,255,.22)}
.day.today .etitle,.day.today .etime{color:#fff}
.day.debut{background:linear-gradient(160deg,var(--yellow-soft),var(--yellow))}
.day.debut .dow,.day.debut .date{color:#7a5a12}
.day.debut .evt{background:rgba(255,255,255,.42)}
.day.debut .etitle,.day.debut .etime{color:#7a5a12}
.day.debut .etitle{font-weight:700}

/* 프로필 — 사진/정보 높이 맞춤(stretch) */
.profile{display:grid;grid-template-columns:340px 1fr;gap:36px;align-items:stretch;
  margin-top:60px;background:var(--card);border-radius:28px;padding:36px;box-shadow:var(--shadow)}
.portrait{position:relative;height:100%;border-radius:22px;overflow:hidden;
  background:radial-gradient(120% 110% at 50% 20%,var(--yellow-soft),var(--pink-soft));
  display:grid;place-items:center}
.portrait img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.portrait .halo{position:absolute;top:12%;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.9),rgba(255,255,255,0) 70%)}
.portrait .ph{font-size:78px;filter:drop-shadow(0 6px 10px rgba(238,155,198,.35));z-index:1}
.portrait .cap{position:absolute;bottom:16px;font-family:var(--hand);font-size:20px;color:var(--pink-deep)}
.pinfo{display:flex;flex-direction:column;justify-content:center}
.pinfo .en{font-family:var(--latin);font-weight:600;font-size:11px;letter-spacing:3px;
  text-transform:uppercase;color:var(--pink-deep)}
.pinfo h2{font-family:var(--disp);font-weight:400;font-size:35px;margin:2px 0 4px;color:var(--ink)}
.pinfo h2 span{color:var(--ink)}
.hearts{color:var(--pink);letter-spacing:3px;font-size:14px}
.rows{margin-top:18px}
.rows .r{display:flex;padding:11px 0;border-bottom:1px dashed var(--line);font-size:16px}
.rows .r:last-of-type{border-bottom:none}
.rows .k{width:110px;color:var(--sub);flex-shrink:0}
.rows .v{color:var(--ink)}
.rows .v b{color:var(--pink-deep)}
.bubble{margin-top:16px;background:var(--yellow-soft);border-radius:16px 16px 16px 4px;
  padding:11px 18px;font-family:var(--hand);font-size:25px;line-height:1.3;color:var(--ink);align-self:flex-start}

/* 링크 */
.links{display:flex;gap:12px;justify-content:center;margin-top:40px}
.links a{display:flex;align-items:center;gap:7px;font-size:16px;padding:12px 26px;border-radius:24px;
  background:var(--card);box-shadow:var(--shadow);color:var(--sub);transition:.2s}
.links a:hover{color:#fff;background:var(--pink);transform:translateY(-2px)}
.links a .ic{font-size:16px}
.links a img.ic{width:18px;height:18px;object-fit:contain;display:block}

/* ══ 바텀 ══ */
.bottom{position:relative;z-index:1;margin-top:56px;padding:34px 0 44px;text-align:center;border-top:1px solid var(--line)}
.bottom .cloud{font-size:22px;letter-spacing:6px;color:var(--pink);opacity:.85}
.bottom p{margin-top:10px;font-size:13px;color:var(--sub);line-height:1.9}

/* 문의 모달 */
.ov{position:fixed;inset:0;background:rgba(150,90,120,.32);backdrop-filter:blur(3px);
  display:none;place-items:center;z-index:60;padding:20px}
.ov.on{display:grid}
.modal{background:var(--card);border-radius:24px;padding:30px;width:100%;max-width:380px}
.modal h3{font-family:var(--disp);font-size:22px;margin-bottom:4px}
.modal .d{font-size:14px;color:var(--sub);margin-bottom:16px}
.modal input,.modal textarea{width:100%;border:1.5px solid var(--line);border-radius:14px;
  padding:12px 14px;font-family:var(--body);font-size:14px;margin-bottom:10px;
  background:var(--page);color:var(--ink);resize:vertical;outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--pink)}
.astat{min-height:18px;font-size:13px;color:var(--pink-deep);text-align:center;margin:2px 0 8px}
.astat{font-size:13px;color:var(--pink-deep);min-height:17px;margin:2px 0 8px}
.mbtns{display:flex;gap:10px;margin-top:4px}
.mbtns button{flex:1;border:none;border-radius:14px;padding:12px;font-family:var(--body);font-size:14px;cursor:pointer}
.mbtns .c{background:var(--pink-soft);color:var(--pink-deep)}
.mbtns .s{background:var(--pink);color:#fff}

@media(max-width:860px){
  .profile{grid-template-columns:1fr;align-items:center;text-align:center}
  .portrait{max-width:280px;aspect-ratio:4/5;height:auto;margin:0 auto}
  .pinfo{justify-content:flex-start}
  .rows .r{justify-content:center}
  .bubble{align-self:center}
}
@media(max-width:680px){
  .menu{display:none}
  .week{grid-template-columns:repeat(3,1fr)}
  .day{min-height:130px}
}
</style>
</head>

<div class="ov" id="ov" onclick="if(event.target===this)closeAsk()">
  <div class="modal">
    <h3>✉️ 문의하기</h3>

      <button class="c" onclick="closeAsk()">취소</button>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var DOW=['월','화','수','목','금','토','일'];
function ymd(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function mondayOf(date){var d=new Date(date);d.setHours(0,0,0,0);var w=(d.getDay()+6)%7;d.setDate(d.getDate()-w);return d;}

/* ═══ 구글 캘린더 연동 ═══
   1) Google Cloud Console → 프로젝트 생성 → "Google Calendar API" 사용 설정
   2) 사용자 인증 정보 → API 키 만들기 → 아래 apiKey 에 붙여넣기
      (보안: 그 키를 "HTTP 리퍼러"로 사이트 도메인만 허용하도록 제한하세요)
   3) 캘린더가 '공개' 상태여야 읽힘 (지금 공개 설정 완료)
   ※ 비공개 iCal 주소(secret)는 절대 여기에 넣지 마세요 — 노출되면 누구나 열람 가능 */
var GCAL={
  calendarId:'v.kururung@gmail.com',
  apiKey:'AIzaSyCbtvWOOuF45tUqRlaEeMlW6i5n-17deLE'    /* ← API 키. 비워두면 아래 샘플이 대신 표시됩니다. */
};

function ymdSeoul(d){ return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Seoul'}).format(d); }

var SAMPLE={
  '2026-07-20':['낮방 11시 🌙'],'2026-07-21':['종겜 저녁 8시 🎮'],
  '2026-07-22':['쉬는 날 💤'],'2026-07-23':['노래방송 🎤'],
  '2026-07-24':['합방 예정 ✨'],'2026-07-25':['자유방송 🌿'],
  '2026-07-26':['공지 확인 📌'],'2026-08-01':['데뷔날 💗'],'2026-08-02':['2일차 🌿']
};

var DEBUG=false;            /* true로 바꾸면 콘솔에 연동 로그가 찍힙니다(문제 진단용) */
var POLL_MS=60*60*1000;     /* 폴링 주기(ms). 테스트할 땐 10*1000(10초)처럼 줄여도 됩니다 */

async function fetchWeekSchedule(weekStartISO, weekEndISO){
  var sampleWeek=function(){ var s={}; Object.keys(SAMPLE).forEach(function(k){ if(k>=weekStartISO&&k<=weekEndISO) s[k]=SAMPLE[k]; }); return s; };
  if(!GCAL.apiKey) return sampleWeek();   /* 키 없으면 샘플 */
  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(GCAL.calendarId)+'/events'
    +'?key='+GCAL.apiKey+'&singleEvents=true&orderBy=startTime&maxResults=100&timeZone=Asia/Seoul'
    +'&timeMin='+encodeURIComponent(weekStartISO+'T00:00:00+09:00')
    +'&timeMax='+encodeURIComponent(weekEndISO+'T23:59:59+09:00');
  try{
    var r=await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    var j=await r.json(), out={};
    (j.items||[]).forEach(function(ev){
      var st=ev.start||{}, key, tl='';
      if(st.date){ key=st.date; }                        /* 종일 일정 */
      else if(st.dateTime){                              /* 시간 일정 */
        var dt=new Date(st.dateTime);
        key=ymdSeoul(dt);
        tl=new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',hour:'2-digit',minute:'2-digit',hour12:false}).format(dt)+' ';
      } else return;
      (out[key]=out[key]||[]).push((tl+(ev.summary||'(제목 없음)')).trim());
    });
    return out;
  }catch(e){
    /* 미배포/도메인 제한 등으로 못 불러오면 조용히 샘플로 대체(테스트 편의) */
    if(DEBUG) console.warn('[캘린더] 실시간 연동 실패 → 샘플 표시:', e && e.message);
    return sampleWeek();
  }
}

var DEBUT='2026-08-01';
async function renderWeek(){
  var mon=mondayOf(new Date());
  var sun=new Date(mon);sun.setDate(sun.getDate()+6);
  var ws=ymd(mon),we=ymd(sun),todayStr=ymd(new Date());
  document.getElementById('weekRange').textContent=(mon.getMonth()+1)+'/'+mon.getDate()+' ~ '+(sun.getMonth()+1)+'/'+sun.getDate();
  var data={};try{data=await fetchWeekSchedule(ws,we);}catch(e){console.error('schedule',e);}
  var html='';
  for(var i=0;i<7;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);var ds=ymd(d);
    var cls='day'+(i===6?' sun':'')+(i===5?' sat':'');
    if(ds===DEBUT)cls+=' debut';else if(ds===todayStr)cls+=' today';
    var evts=data[ds]||[];
    var evtHtml;
    if(evts.length){
      var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
      var times=[], titles=[];
      evts.forEach(function(t){
        var mt=/^(\d{1,2}:\d{2})\s+(.*)$/.exec(t);
        if(mt){ times.push(mt[1]); titles.push(mt[2]); }
        else { titles.push(t); }
      });
      var timeHtml = times.length ? '<span class="etime">'+esc(times.join(' · '))+'</span>' : '';
      var titleHtml = '<span class="etitle">'+esc(titles.join(' · '))+'</span>';
      var tip=esc(evts.join(' / ')).replace(/"/g,'&quot;');
      evtHtml='<div class="evt" title="'+tip+'"><div class="evt-in">'+timeHtml+titleHtml+'</div></div>';
    } else {
      evtHtml='<div class="evt empty"><div class="evt-in"><span class="etitle">—</span></div></div>';
    }
    html+='<div class="'+cls+'"><div class="dow">'+DOW[i]+'</div><div class="date">'+d.getDate()+'</div>'+evtHtml+'</div>';
  }
  document.getElementById('week').innerHTML=html;
  var sl=document.getElementById('syncLabel');
  if(sl){
    var t=new Date(),p=function(n){return('0'+n).slice(-2);};
    var ts=t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate())+' '+p(t.getHours())+':'+p(t.getMinutes())+':'+p(t.getSeconds());
    sl.textContent='업데이트 '+ts;
  }
}
function startPolling(){renderWeek();setInterval(renderWeek,POLL_MS);}
function scheduleMondayRollover(){var now=new Date();var nm=mondayOf(now);nm.setDate(nm.getDate()+7);setTimeout(function(){renderWeek();scheduleMondayRollover();},(nm-now)+1000);}
startPolling();scheduleMondayRollover();

function openAsk(){document.getElementById('ov').classList.add('on');document.getElementById('nick').focus();}
function closeAsk(){document.getElementById('ov').classList.remove('on');var s=document.getElementById('askStatus');if(s)s.textContent='';}

/* ═══ 문의 저장(Supabase) ═══
   1) supabase.com → New project 생성
   2) Table Editor → inquiries 테이블 만들기 (컬럼: nickname, contact, message = text)
   3) RLS 정책: anon 역할에 INSERT 허용 (SELECT는 막아서 남이 못 읽게)
   4) Project Settings → API 에서 URL과 anon key를 아래에 붙여넣기 (anon key는 공개돼도 안전) */

async function sendAsk(){
  var n=(document.getElementById('nick').value||'').trim();
  var c=(document.getElementById('contact').value||'').trim();
  var m=(document.getElementById('msg').value||'').trim();
  var st=document.getElementById('askStatus');
  if(!n){ if(st)st.textContent='닉네임을 입력해 주세요!'; return; }
  if(!m){ if(st)st.textContent='문의 내용을 적어주세요!'; return; }

    if(st)st.textContent='보냈어요! 💌';
