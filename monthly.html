<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div id="sky"></div>
<header class="top"></header>

<main class="content"><div class="wrap">
  <div class="mhead">
    <div class="en" id="galEn"></div>
    <h2 id="galTitle"></h2>
  </div>

  <div class="viewer">
    <div class="empty" id="empty">불러오는 중…</div>
    <div id="body" style="display:none">
      <div class="vmain">
        <button class="arw" id="prev" aria-label="이전">&#10094;</button>
        <div class="stage" id="stage" onclick="openLb()"></div>
        <button class="arw" id="next" aria-label="다음">&#10095;</button>
      </div>
      <div class="cap">
        <div class="t" id="capT"></div>
        <div class="d" id="capD"></div>
      </div>
      <div class="thumbs-row">
        <button class="tarw" id="tprev">&#8249;</button>
        <div class="thumbs" id="thumbs"></div>
        <button class="tarw" id="tnext">&#8250;</button>
      </div>
    </div>
  </div>
</div></main>

<footer></footer>

<div class="lb" id="lb" onclick="closeLb()">
  <img id="lbImg" src="" alt="">
  <div class="lbcap" id="lbCap"></div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
initPage('monthly.html');

var G=CFG.gallery||{};
document.getElementById('galEn').textContent=G.sectionEn||'';
document.getElementById('galTitle').textContent=T(G.sectionTitle||'화보집');

var PER=G.thumbsPerRow||5, page=0, sel=0, PHOTOS=[];
document.getElementById('stage').style.maxHeight=(G.maxHeight||640)+'px';

function showMain(i){
  if(!PHOTOS.length) return;
  sel=(i+PHOTOS.length)%PHOTOS.length;
  var p=PHOTOS[sel], stage=document.getElementById('stage');
  if(p.image_url){
    stage.className='stage loading';
    stage.innerHTML='<img src="'+esc(p.image_url)+'" alt="'+esc(p.title)+'" style="max-height:'
      +(G.maxHeight||640)+'px" onload="this.parentNode.classList.remove(\'loading\')">';
  }else{
    stage.className='stage';
    stage.innerHTML='<span class="ph">&#128444;</span>';
  }
  document.getElementById('capT').textContent=p.title||'';
  document.getElementById('capD').textContent=p.description||'';
  page=Math.floor(sel/PER);
  renderThumbs();
}
function renderThumbs(){
  var wrap=document.getElementById('thumbs');
  var s=page*PER, list=PHOTOS.slice(s,s+PER);
  wrap.innerHTML=list.map(function(p,k){
    var idx=s+k;
    var inner=p.image_url?'<img src="'+esc(p.image_url)+'" alt="">':'<span class="ph">&#128444;</span>';
    return '<div class="thumb'+(idx===sel?' on':'')+'" data-i="'+idx+'">'+inner+'</div>';
  }).join('');
  Array.prototype.forEach.call(wrap.querySelectorAll('.thumb'),function(el){
    el.addEventListener('click',function(){ showMain(+el.dataset.i); });
  });
  var tp=Math.ceil(PHOTOS.length/PER);
  document.getElementById('tprev').disabled=(page<=0);
  document.getElementById('tnext').disabled=(page>=tp-1);
}
function openLb(){
  var p=PHOTOS[sel]; if(!p||!p.image_url) return;
  document.getElementById('lbImg').src=p.image_url;
  document.getElementById('lbCap').textContent=p.title||'';
  document.getElementById('lb').classList.add('on');
}
function closeLb(){document.getElementById('lb').classList.remove('on');}

(async function(){
  try{
    PHOTOS=await DB.list('gallery',{order:[{col:'sort_order',asc:true},{col:'created_at',asc:false}]});
  }catch(e){ PHOTOS=[]; }

  if(!PHOTOS.length){
    document.getElementById('empty').textContent=T(G.emptyText||'등록된 화보가 없어요');
    return;
  }
  document.getElementById('empty').style.display='none';
  document.getElementById('body').style.display='block';
  document.getElementById('prev').addEventListener('click',function(){ showMain(sel-1); });
  document.getElementById('next').addEventListener('click',function(){ showMain(sel+1); });
  document.getElementById('tprev').addEventListener('click',function(){ if(page>0){page--;renderThumbs();} });
  document.getElementById('tnext').addEventListener('click',function(){ if((page+1)*PER<PHOTOS.length){page++;renderThumbs();} });
  showMain(0);
})();
</script>
</body>
</html>
